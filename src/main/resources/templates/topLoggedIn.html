<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <link rel="stylesheet" href="/css/topLoggedIn.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
</head>
<body>
    <header>
        <div class="header-container">
            <h1 class="logo">My Portfolio</h1>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn logout-btn">ログアウト</button>
            </form>
        </div>
    </header>
    <main class="main-container">
        <div class="wrapper-content">
            <div class="content">
                <div class="content-left">
                    <div class="avatar-container">
                        <img class="avatar" th:if="${avatarBase64}" th:src="'data:image/jpeg;base64,' + ${avatarBase64}" alt="アバター画像">
                    </div>
                        <p class="user-name" th:text="${user.name}"></p>
                </div>
                <div class="content-right">
                    <div class="introduction-container">
                    <h2 class="introduction-title">自己紹介</h2>
                    </div>
                    <p class="introduction" th:text="${user.introduction}"></p>
                    <a th:href="@{/profile/edit}" class="btn editprofile-btn">自己紹介を編集する</a>
                </div>
            </div>
        </div>
        <div class="wrapper-chart">

            <h2>学習チャート</h2>

            <a th:href= "@{/skill/edit}" class="btn editskill-btn">編集する</a>

            <h6 class="chart-title">Chart.js Bar Chart</h6>

            <div class="chart-container">

                <canvas id="chart" class="chart"></canvas>

            </div>
        </div>
    </main>
    <footer>
        <div class="footer-container">
            <p class="footer-text">portfolio site</p>
        </div>
    </footer>

    <script type="text/javascript" th:inline="javascript">

        let backendData = /*[[${backendData}]]*/ [];
        let frontendData = /*[[${frontendData}]]*/ [];
        let infraData = /*[[${infraData}]]*/ [];

        let ctx = document.getElementById('chart').getContext('2d');
        let chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['先々月', '先月', '今月'],
                datasets: [ {
                    label: 'バックエンド',
                    data: backendData,
                    backgroundColor: 'rgba(240, 128, 128, 0.6)',
                    borderWidth: 0,
                }, {
                    label: 'フロントエンド',
                    data: frontendData,
                    backgroundColor: 'rgba(255, 165, 0, 0.6)',
                    borderWidth: 0,
                }, {
                    label: 'インフラ',
                    data: infraData,
                    backgroundColor: 'rgba(255, 255, 207, 0.6)',
                    borderWidth: 0,
                }

                ]
            },
            options: {
                responsive: true,
                scales: {
                    y: {
                        beginAtZero: true,
                        suggestedMax: 100,
                        ticks: {
                            stepSize: 10
                        }
                    }
                },
            },


    });
    
    </script>
</body>
</html>
